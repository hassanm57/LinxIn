# LinxIn source config — the companies `scan` pulls listings from.
#
# Group each company under the ATS it uses. The "token" is the board slug from
# the company's public careers URL:
#   Greenhouse -> job-boards.greenhouse.io/<token>   (or boards.greenhouse.io/<token>)
#   Lever      -> jobs.lever.co/<token>
#   Ashby      -> jobs.ashbyhq.com/<token>
#
# Every entry below was verified live against the real public API on 2026-07-03
# (each returned real job listings at check time — job counts change daily, so
# don't expect the same numbers). `scan` skips any token that 404s and tells
# you, so a stale token won't break a run — but re-check periodically since
# companies do migrate ATS platforms.
#
# This list leans toward companies known to hire remote-anywhere or with a
# track record of Pakistan/South-Asia hires. Trim it to roles YOU want, and
# add your own — `npm run scan -- --keywords "..." --remote-only` filters
# whatever is here.

greenhouse:
  - { company: "GitLab", token: "gitlab" }
  - { company: "Stripe", token: "stripe" }
  - { company: "Datadog", token: "datadog" }
  - { company: "Cloudflare", token: "cloudflare" }
  - { company: "Reddit", token: "reddit" }
  - { company: "Pinterest", token: "pinterest" }
  - { company: "Brex", token: "brex" }
  - { company: "Elastic", token: "elastic" }
  - { company: "Affirm", token: "affirm" }
  - { company: "Instacart", token: "instacart" }
  - { company: "Figma", token: "figma" }
  - { company: "Asana", token: "asana" }
  - { company: "Robinhood", token: "robinhood" }
  - { company: "Discord", token: "discord" }
  - { company: "Airtable", token: "airtable" }
  # Pakistan-relevant: Dubai HQ, hires heavily for Karachi engineering/growth roles
  - { company: "Careem", token: "careem" }

lever:
  # Lever has a much smaller live-company footprint than Greenhouse/Ashby today;
  # most large employers have migrated off it. Palantir is a confirmed exception.
  - { company: "Palantir Technologies", token: "palantir" }

ashby:
  - { company: "OpenAI", token: "openai" }
  - { company: "Ramp", token: "ramp" }
  - { company: "Notion", token: "notion" }
  - { company: "Replit", token: "replit" }
  - { company: "Synthesia", token: "synthesia" }
  - { company: "Linear", token: "linear" }
  - { company: "Substack", token: "substack" }
  - { company: "Runway", token: "runway" }
  # Pakistan-relevant: Lahore-based, YC-backed B2B marketplace
  - { company: "Tajir", token: "tajir" }

# ---------------------------------------------------------------------------
# Pakistan tech companies — reference list (alphabetical)
#
# Verified this list against real ATS APIs first: almost none of these run
# public Greenhouse/Ashby/Lever boards (Tajir and Careem above are the
# confirmed exceptions), so `scan` can't pull them automatically. This is
# expected, not a bug — it's exactly why `ingest` exists.
#
# To use: open a company's careers page below, copy a listing you're
# interested in, and tell your AI CLI "ingest this listing: <paste>". It'll
# get scored (Fit/Reality/Trust) and tracked exactly like a scanned job.
#
# Domains were checked live on 2026-07-03. Spans IT services/software houses,
# fintech, e-commerce/logistics, telecom, and health/ed-tech-adjacent startups.
# A couple (Bykea, Telenor) sit behind a bot-check that blocks automated
# fetches but load fine in a real browser — still real, correct URLs.
# ---------------------------------------------------------------------------
