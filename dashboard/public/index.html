<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LinxIn — Pipeline</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="bg-glow"></div>

  <header class="topbar">
    <div class="brand">
      <div class="logo">Lx</div>
      <div>
        <h1>LinxIn</h1>
        <p class="tag">Your AI-run war room for your job hunt</p>
      </div>
    </div>
    <div class="topbar-right">
      <span id="demo-badge" class="demo-badge" hidden>demo data</span>
      <div class="count-chip"><span id="count">0</span> roles</div>
    </div>
  </header>

  <section class="stats" id="stats"><!-- score-summary chips injected here --></section>

  <section class="controls">
    <div class="search-wrap">
      <svg class="search-ic" viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M21 20l-4.35-4.35a7.5 7.5 0 10-1.4 1.4L20 21zM5 10.5a5.5 5.5 0 1111 0 5.5 5.5 0 01-11 0z"/></svg>
      <input id="search" type="search" placeholder="Search title, company, notes…" />
    </div>
    <div class="filters" id="status-filters"><!-- status pills injected --></div>
    <label class="sort">
      Sort
      <select id="sort">
        <option value="fit">Fit</option>
        <option value="reality">Reality</option>
        <option value="trust">Trust</option>
        <option value="title">Title</option>
      </select>
    </label>
  </section>

  <main id="grid" class="grid" aria-live="polite">
    <div class="loader" aria-label="loading"><span></span><span></span><span></span></div>
  </main>

  <footer class="foot">
    Local-first · nothing leaves your machine · <span id="src-path"></span>
  </footer>

  <!-- detail drawer -->
  <div id="drawer" class="drawer" hidden>
    <div class="drawer-scrim" data-close></div>
    <aside class="drawer-panel" role="dialog" aria-modal="true">
      <button class="drawer-close" data-close aria-label="Close">×</button>
      <div id="drawer-body"></div>
    </aside>
  </div>

  <script src="/app.js"></script>
</body>
</html>
